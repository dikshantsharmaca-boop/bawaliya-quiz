<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Path to the Temple</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --maroon: #7A1F2B;
    --maroon-deep: #5A1620;
    --gold: #D4A017;
    --gold-soft: #E8C766;
    --bg: #1A0F0A;
    --bg-raised: #241510;
    --parchment: #F5E6C8;
    --flame: #E8833A;
    --line: rgba(212, 160, 23, 0.18);
    --dusk-top: #1B2A4A;
    --dusk-mid: #3A4D75;
    --dusk-horizon: #C97A4F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; }
  }

  html, body {
    background: var(--bg);
    overflow: hidden;
    height: 100%;
    touch-action: none;
  }

  body {
    color: var(--parchment);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 0;
  }

  .serif { font-family: 'Georgia', 'Iowan Old Style', serif; }

  .stage {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 760px;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    z-index: 5;
    padding: 28px 22px;
  }
  .screen.active { display: flex; flex-direction: column; }

  #screen-menu { justify-content: center; align-items: center; text-align: center; }
  .symbol { font-size: 38px; margin-bottom: 16px; }
  h1.title { font-size: 25px; color: var(--gold-soft); margin-bottom: 8px; font-weight: 400; }
  .subtitle { font-size: 13.5px; color: rgba(245,230,200,0.6); line-height: 1.6; margin-bottom: 30px; padding: 0 8px; }

  .btn {
    display: block;
    width: 100%;
    max-width: 240px;
    font-size: 15px;
    font-weight: 600;
    color: var(--bg);
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    border: none;
    border-radius: 10px;
    padding: 15px 20px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(212,160,23,0.25);
  }
  .btn:active { transform: scale(0.97); }

  .best-score {
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--flame);
    margin-bottom: 22px;
  }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 6;
    display: none;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 18px 0;
    pointer-events: none;
  }
  #hud.active { display: flex; }

  .hud-score {
    font-size: 22px;
    font-weight: 600;
    color: var(--parchment);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .hud-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(245,230,200,0.7);
  }

  #game-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: block;
  }

  #screen-result .unveil-flame {
    width: 70px; height: 70px; margin: 0 auto 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 30px;
    background: radial-gradient(circle, rgba(232,131,58,0.22) 0%, transparent 75%);
  }
  #screen-result { justify-content: center; align-items: center; text-align: center; background: rgba(26,15,10,0.92); }
  .result-score { font-size: 36px; color: var(--gold-soft); margin-bottom: 4px; font-weight: 600; }
  .result-label { font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--flame); margin-bottom: 22px; }
  .result-best { font-size: 13px; color: rgba(245,230,200,0.6); margin-bottom: 26px; }
  .result-best strong { color: var(--gold-soft); font-weight: 600; }

  .btn-ghost {
    background: transparent;
    color: var(--gold-soft);
    border: 1px solid var(--line);
    box-shadow: none;
    margin-top: 10px;
  }

  footer.brandmark {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: rgba(245,230,200,0.3);
    letter-spacing: 0.5px;
    z-index: 2;
    pointer-events: none;
  }

  .swipe-hint {
    position: absolute;
    bottom: 70px; left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(245,230,200,0.55);
    z-index: 6;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div>
      <div class="hud-label">Distance</div>
      <div class="hud-score" id="hud-score">0</div>
    </div>
    <div style="text-align:right;">
      <div class="hud-label">Coins</div>
      <div class="hud-score" id="hud-coins" style="color:#D4A017;">0</div>
    </div>
  </div>

  <div class="swipe-hint" id="swipe-hint">Swipe up to jump &middot; swipe down to duck</div>

  <section id="screen-menu" class="screen active">
    <div class="symbol">🪔</div>
    <h1 class="title serif">Path to the Temple</h1>
    <p class="subtitle">Run the devotee's road. Dodge what blocks the way. See how far faith carries you.</p>
    <div class="best-score" id="menu-best">BEST: 0M</div>
    <button class="btn" id="btn-start">Begin the Run</button>
    <a href="home.html" class="btn btn-ghost" style="text-decoration:none; display:block; text-align:center; margin-top:12px;">Back to Path</a>
  </section>

  <section id="screen-result" class="screen">
    <div class="unveil-flame">🔮</div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-label">METERS WALKED TOWARD THE TEMPLE</div>
    <div class="result-best" id="result-best">Best: <strong>0m</strong></div>
    <div class="result-best" id="result-coins" style="margin-top:-16px;">Coins gathered: <strong>0</strong></div>
    <button class="btn" id="btn-retry">Run Again</button>
    <button class="btn btn-ghost" id="btn-menu">Back to Menu</button>
    <a href="home.html" class="btn btn-ghost" style="text-decoration:none; display:block; text-align:center; margin-top:10px;">Back to Path</a>
  </section>

  <footer class="brandmark serif">$BAWALIYA &middot; Dec 1, 2026 &middot; pump.fun</footer>
</div>

<script>
(function () {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const STORAGE_KEY = 'bawaliya_runner_best';

  const stage = document.getElementById('stage');
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, GROUND_Y;

  function resize() {
    const rect = stage.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    GROUND_Y = H * 0.74;
  }
  window.addEventListener('resize', resize);
  resize();

  const LANE_Y = () => GROUND_Y;
  const PLAYER_X = () => W * 0.28;
  const PLAYER_W = 34;
  const PLAYER_H_STAND = 52;
  const PLAYER_H_DUCK = 30;

  let running = false;
  let raf = null;
  let lastTime = 0;
  let speed = 0;
  const BASE_SPEED = 260;
  const MAX_SPEED = 520;

  let distance = 0;
  let best = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
  document.getElementById('menu-best').textContent = `BEST: ${best}M`;

  let player = {
    y: 0,
    vy: 0,
    ducking: false,
    state: 'run',
    runCycle: 0
  };

  const GRAVITY = 1700;
  const JUMP_VELOCITY = -620;

  let obstacles = [];
  let coins = [];
  let coinCount = 0;
  let spawnTimer = 0;
  let nextSpawnGap = 1.1;
  let coinSpawnTimer = 0;
  let nextCoinGap = 0.5;

  let groundOffset = 0;

  function spawnObstacle() {
    const type = Math.random() < 0.55 ? 'low' : 'high';
    const w = type === 'low' ? 30 + Math.random() * 14 : 46 + Math.random() * 14;
    const h = type === 'low' ? 38 + Math.random() * 16 : 26;
    obstacles.push({
      x: W + 40,
      w, h, type,
      passed: false
    });
  }

  // Coins spawn in short arcs of 3-5, at a height reachable while running normally
  // (never forces a jump/duck just to collect — collection is a bonus, not a requirement)
  function spawnCoinArc() {
    const count = 3 + Math.floor(Math.random() * 3);
    const startX = W + 60;
    const gap = 34;
    // arc sits at chest height while standing, so normal running collects most of them
    const baseY = GROUND_Y - PLAYER_H_STAND * 0.62;
    const arcHeight = Math.random() < 0.4 ? 26 : 0; // sometimes a gentle rise/fall
    for (let i = 0; i < count; i++) {
      const t = i / (count - 1 || 1);
      const arcOffset = arcHeight ? -Math.sin(t * Math.PI) * arcHeight : 0;
      coins.push({
        x: startX + i * gap,
        y: baseY + arcOffset,
        r: 9,
        collected: false,
        spin: Math.random() * Math.PI * 2
      });
    }
  }

  function resetGame() {
    distance = 0;
    speed = BASE_SPEED;
    obstacles = [];
    coins = [];
    coinCount = 0;
    spawnTimer = 0;
    nextSpawnGap = 1.3;
    coinSpawnTimer = 0;
    nextCoinGap = 0.9;
    player.y = 0;
    player.vy = 0;
    player.ducking = false;
    player.state = 'run';
    groundOffset = 0;
    document.getElementById('hud-coins').textContent = '0';
  }

  let touchStartY = null;
  let touchStartTime = 0;

  function doJump() {
    if (player.state === 'jump') return;
    player.vy = JUMP_VELOCITY;
    player.state = 'jump';
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  }

  function startDuck() {
    if (player.state === 'jump') return;
    player.ducking = true;
    player.state = 'duck';
  }

  function endDuck() {
    if (player.state === 'duck') {
      player.ducking = false;
      player.state = 'run';
    }
  }

  stage.addEventListener('touchstart', (e) => {
    if (!running) return;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  stage.addEventListener('touchend', (e) => {
    if (!running || touchStartY === null) return;
    const endY = e.changedTouches[0].clientY;
    const dy = endY - touchStartY;
    const dt = Date.now() - touchStartTime;

    if (Math.abs(dy) < 18 && dt < 300) {
      doJump();
    } else if (dy < -30) {
      doJump();
    } else if (dy > 30) {
      startDuck();
      setTimeout(endDuck, 420);
    }
    touchStartY = null;
  }, { passive: true });

  window.addEventListener('keydown', (e) => {
    if (!running) return;
    if (e.code === 'Space' || e.code === 'ArrowUp') doJump();
    if (e.code === 'ArrowDown') startDuck();
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowDown') endDuck();
  });

  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#16223D');
    grad.addColorStop(0.55, '#3A4D75');
    grad.addColorStop(1, '#C97A4F');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    ctx.beginPath();
    ctx.arc(W * 0.78, GROUND_Y * 0.62, 34, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(232,199,102,0.85)';
    ctx.fill();

    ctx.fillStyle = 'rgba(26,15,10,0.55)';
    const baseX = W * 0.78, baseY = GROUND_Y * 0.62;
    ctx.beginPath();
    ctx.moveTo(baseX - 26, baseY + 30);
    ctx.lineTo(baseX - 26, baseY + 6);
    ctx.lineTo(baseX - 14, baseY - 14);
    ctx.lineTo(baseX, baseY - 30);
    ctx.lineTo(baseX + 14, baseY - 14);
    ctx.lineTo(baseX + 26, baseY + 6);
    ctx.lineTo(baseX + 26, baseY + 30);
    ctx.closePath();
    ctx.fill();
  }

  function drawGround() {
    ctx.fillStyle = '#1A0F0A';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    ctx.strokeStyle = 'rgba(212,160,23,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(212,160,23,0.18)';
    ctx.lineWidth = 3;
    const dashLen = 26, gapLen = 22, total = dashLen + gapLen;
    let x = -((groundOffset) % total);
    while (x < W) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y + 14);
      ctx.lineTo(x + dashLen, GROUND_Y + 14);
      ctx.stroke();
      x += total;
    }
  }

  /* ============================================================
     PLAYER — detailed saint character
     Robe with shading + hem trim, defined beard, proper staff
     with ornamental top, draped beads, dhoti folds while running.
     ============================================================ */
  function drawPlayer() {
    const x = PLAYER_X();
    const state = player.state;
    const ducking = state === 'duck';
    const jumping = state === 'jump';
    const h = ducking ? PLAYER_H_DUCK : PLAYER_H_STAND;
    const groundY = GROUND_Y - player.y;
    const topY = groundY - h;

    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const robeColor = '#E8C766';
    const robeShade = '#C9A24A';
    const robeTrim = '#7A1F2B';
    const skinColor = '#D9A86C';
    const skinShade = '#B9854F';
    const staffColor = '#8A5A2B';
    const staffDark = '#5E3A18';
    const tilakColor = '#E8833A';
    const beadColor = '#7A1F2B';
    const beadHighlight = '#9A3A48';
    const beardColor = '#F0F0EC';
    const beardShade = '#D8D8D0';

    if (ducking) {
      const cx = x, cy = topY + h * 0.5;

      // staff trailing behind, drawn first so the body overlaps it
      ctx.strokeStyle = staffColor;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - PLAYER_W * 0.55, cy + h * 0.32);
      ctx.lineTo(cx - PLAYER_W * 1.1, cy - h * 0.08);
      ctx.stroke();
      ctx.fillStyle = staffDark;
      ctx.beginPath();
      ctx.arc(cx - PLAYER_W * 1.1, cy - h * 0.08, 3, 0, Math.PI * 2);
      ctx.fill();

      // crouched robe body with simple shading
      ctx.fillStyle = robeColor;
      ctx.beginPath();
      ctx.ellipse(cx, cy + h * 0.18, PLAYER_W * 0.64, h * 0.44, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = robeShade;
      ctx.beginPath();
      ctx.ellipse(cx + 4, cy + h * 0.3, PLAYER_W * 0.5, h * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      // hem trim line
      ctx.strokeStyle = robeTrim;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + h * 0.3, PLAYER_W * 0.55, h * 0.3, 0, 0.1, Math.PI - 0.1);
      ctx.stroke();

      // beads
      ctx.fillStyle = beadColor;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(cx + 5 + i * 3, cy - h * 0.05 + Math.abs(i) * 1.5, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // head, tucked low
      ctx.beginPath();
      ctx.fillStyle = skinColor;
      ctx.arc(cx + 6, cy - h * 0.24, 7.5, 0, Math.PI * 2);
      ctx.fill();

      // short beard hint while ducking
      ctx.fillStyle = beardColor;
      ctx.beginPath();
      ctx.ellipse(cx + 6, cy - h * 0.24 + 6, 5, 4, 0, 0, Math.PI);
      ctx.fill();

      // tilak
      ctx.strokeStyle = tilakColor;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(cx + 6, cy - h * 0.24 - 6.5);
      ctx.lineTo(cx + 6, cy - h * 0.24 - 1.5);
      ctx.stroke();

      ctx.restore();
      return;
    }

    // running / jumping figure with limbs
    const cycle = player.runCycle;
    const swing = jumping ? 0.55 : Math.sin(cycle * Math.PI * 2);
    const swingBack = jumping ? -0.4 : Math.sin(cycle * Math.PI * 2 + Math.PI);

    const headR = 10.5;
    const headCx = x;
    const headCy = topY + headR + 4;
    const shoulderY = headCy + headR + 4;
    const hipY = shoulderY + h * 0.36;
    const legLen = groundY - hipY;

    // helper: draw a tapered limb segment as a filled shape (reads as a real limb, not a stick)
    function limb(x0, y0, x1, y1, w0, w1, color) {
      const dx = x1 - x0, dy = y1 - y0;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len, ny = dx / len;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x0 + nx * w0, y0 + ny * w0);
      ctx.lineTo(x1 + nx * w1, y1 + ny * w1);
      ctx.lineTo(x1 - nx * w1, y1 - ny * w1);
      ctx.lineTo(x0 - nx * w0, y0 - ny * w0);
      ctx.closePath();
      ctx.fill();
      // rounded joints
      ctx.beginPath(); ctx.arc(x0, y0, w0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x1, y1, w1, 0, Math.PI * 2); ctx.fill();
    }

    // ---- back leg (thigh in robe shade, calf in skin tone) ----
    let backKneeX, backKneeY, backFootX, backFootY;
    if (jumping) {
      backKneeX = x - 8; backKneeY = hipY + legLen * 0.52; backFootX = x - 12; backFootY = hipY + legLen * 0.92;
    } else {
      backKneeX = x + swingBack * 10; backKneeY = hipY + legLen * 0.58; backFootX = x + swingBack * 14; backFootY = groundY;
    }
    limb(x - 4, hipY, backKneeX, backKneeY, 7, 5.5, robeShade);
    limb(backKneeX, backKneeY, backFootX, backFootY, 4.5, 3.4, skinShade);
    // foot
    ctx.fillStyle = skinShade;
    ctx.beginPath(); ctx.ellipse(backFootX + (jumping ? -2 : swingBack*3), backFootY, 5.5, 3, 0, 0, Math.PI*2); ctx.fill();

    // ---- front leg ----
    let frontKneeX, frontKneeY, frontFootX, frontFootY;
    if (jumping) {
      frontKneeX = x + 10; frontKneeY = hipY + legLen * 0.48; frontFootX = x + 15; frontFootY = hipY + legLen * 0.82;
    } else {
      frontKneeX = x + swing * 10; frontKneeY = hipY + legLen * 0.58; frontFootX = x + swing * 14; frontFootY = groundY;
    }
    limb(x + 4, hipY, frontKneeX, frontKneeY, 7.2, 5.8, robeColor);
    limb(frontKneeX, frontKneeY, frontFootX, frontFootY, 4.8, 3.6, skinColor);
    ctx.fillStyle = skinColor;
    ctx.beginPath(); ctx.ellipse(frontFootX + (jumping ? 2 : swing*3), frontFootY, 5.5, 3, 0, 0, Math.PI*2); ctx.fill();

    // ---- torso: fuller, rounded, tapered waist-to-shoulders ----
    ctx.fillStyle = robeColor;
    ctx.beginPath();
    ctx.moveTo(x - PLAYER_W * 0.46, shoulderY + 2);
    ctx.quadraticCurveTo(x - PLAYER_W * 0.5, hipY - 4, x - PLAYER_W * 0.34, hipY + 6);
    ctx.lineTo(x + PLAYER_W * 0.34, hipY + 6);
    ctx.quadraticCurveTo(x + PLAYER_W * 0.5, hipY - 4, x + PLAYER_W * 0.46, shoulderY + 2);
    ctx.quadraticCurveTo(x, shoulderY - 7, x - PLAYER_W * 0.46, shoulderY + 2);
    ctx.closePath();
    ctx.fill();
    // shaded side panel for roundness
    ctx.fillStyle = robeShade;
    ctx.beginPath();
    ctx.moveTo(x + 3, shoulderY + 3);
    ctx.quadraticCurveTo(x + PLAYER_W * 0.42, hipY - 5, x + PLAYER_W * 0.36, hipY + 4);
    ctx.lineTo(x + 8, hipY + 4);
    ctx.quadraticCurveTo(x + 10, hipY - 6, x + 3, shoulderY + 3);
    ctx.closePath();
    ctx.fill();
    // robe trim collar (v-neck)
    ctx.strokeStyle = robeTrim;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(x - PLAYER_W * 0.3, shoulderY + 1);
    ctx.lineTo(x, shoulderY + 10);
    ctx.lineTo(x + PLAYER_W * 0.3, shoulderY + 1);
    ctx.stroke();

    // bead necklace, draped in a soft V across chest
    ctx.fillStyle = beadColor;
    const beadY = shoulderY + 8;
    for (let i = -3; i <= 3; i++) {
      const dip = (3 - Math.abs(i)) * 1.8;
      ctx.beginPath();
      ctx.arc(x + i * 3.6, beadY + dip, 2, 0, Math.PI * 2);
      ctx.fill();
      if (i % 2 === 0) {
        ctx.fillStyle = beadHighlight;
        ctx.beginPath();
        ctx.arc(x + i * 3.6 - 0.6, beadY + dip - 0.6, 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = beadColor;
      }
    }

    // ---- arms: bare, tapered, swinging naturally with the run cycle ----
    let backHandX, backHandY;
    if (jumping) { backHandX = x - 13; backHandY = shoulderY - 4; }
    else { backHandX = x - 6 + swingBack * 9; backHandY = shoulderY + 14 + Math.abs(swing) * 5; }
    limb(x - 5, shoulderY + 4, backHandX, backHandY, 4.6, 3.4, skinShade);

    let frontHandX, frontHandY;
    if (jumping) { frontHandX = x + 14; frontHandY = shoulderY - 2; }
    else { frontHandX = x + 6 + swing * 9; frontHandY = shoulderY + 14 + Math.abs(swingBack) * 5; }
    limb(x + 5, shoulderY + 4, frontHandX, frontHandY, 4.8, 3.6, skinColor);

    // head, with shaded side for roundness
    ctx.beginPath();
    ctx.fillStyle = skinColor;
    ctx.arc(headCx, headCy, headR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = skinShade;
    ctx.beginPath();
    ctx.arc(headCx + 4, headCy + 1, headR * 0.62, 0, Math.PI * 2);
    ctx.fill();
    // re-cover with base tone on the front-facing side so only a thin shade rim shows
    ctx.fillStyle = skinColor;
    ctx.beginPath();
    ctx.arc(headCx + 1, headCy, headR * 0.86, 0, Math.PI * 2);
    ctx.fill();

    // flowing white beard
    ctx.fillStyle = beardColor;
    ctx.beginPath();
    ctx.moveTo(headCx - headR * 0.7, headCy + headR * 0.25);
    ctx.quadraticCurveTo(headCx - 1, headCy + headR * 1.9, headCx + headR * 0.55, headCy + headR * 0.9);
    ctx.quadraticCurveTo(headCx + headR * 0.3, headCy + headR * 0.5, headCx - headR * 0.7, headCy + headR * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = beardShade;
    ctx.beginPath();
    ctx.moveTo(headCx - headR * 0.2, headCy + headR * 0.6);
    ctx.quadraticCurveTo(headCx + 2, headCy + headR * 1.6, headCx + headR * 0.45, headCy + headR * 0.85);
    ctx.quadraticCurveTo(headCx + headR * 0.2, headCy + headR * 0.65, headCx - headR * 0.2, headCy + headR * 0.6);
    ctx.closePath();
    ctx.fill();

    // tilak mark on forehead — thicker, more deliberate
    ctx.strokeStyle = tilakColor;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(headCx, headCy - headR + 1);
    ctx.lineTo(headCx, headCy - 1);
    ctx.stroke();
    ctx.strokeStyle = beadColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(headCx - 2, headCy - headR + 3);
    ctx.lineTo(headCx - 2, headCy - 2);
    ctx.stroke();

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawObstacle(o) {
    ctx.fillStyle = o.type === 'low' ? '#7A1F2B' : '#5A1620';
    const y = o.type === 'low' ? GROUND_Y - o.h : GROUND_Y - PLAYER_H_STAND - 6 - o.h + 14;
    roundRect(o.x, y, o.w, o.h, 5);
    ctx.fill();
    ctx.strokeStyle = 'rgba(212,160,23,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawCoin(c) {
    if (c.collected) return;
    ctx.save();
    ctx.translate(c.x, c.y);
    // gentle spin effect by squashing horizontally based on a phase value
    const squash = Math.cos(c.spin);
    ctx.scale(Math.max(0.25, Math.abs(squash)), 1);
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fillStyle = '#D4A017';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, c.r * 0.62, 0, Math.PI * 2);
    ctx.strokeStyle = '#7A1F2B';
    ctx.lineWidth = 1.3;
    ctx.stroke();
    ctx.restore();
  }

  function getPlayerBox() {
    const x = PLAYER_X();
    const ducking = player.state === 'duck';
    const h = ducking ? PLAYER_H_DUCK : PLAYER_H_STAND;
    const y = GROUND_Y - h - player.y;
    return { x: x - PLAYER_W / 2, y, w: PLAYER_W, h };
  }

  function getObstacleBox(o) {
    const y = o.type === 'low' ? GROUND_Y - o.h : GROUND_Y - PLAYER_H_STAND - 6 - o.h + 14;
    return { x: o.x, y, w: o.w, h: o.h };
  }

  function intersects(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function update(dt) {
    speed = Math.min(MAX_SPEED, BASE_SPEED + distance * 0.6);
    distance += speed * dt * 0.05;
    groundOffset += speed * dt;

    player.vy += GRAVITY * dt;
    player.y -= player.vy * dt;
    if (player.y < 0) { player.y = 0; player.vy = 0; if (player.state === 'jump') player.state = 'run'; }

    if (player.state === 'run') {
      player.runCycle = (player.runCycle + dt * (2.2 + speed / 260)) % 1;
    }

    spawnTimer += dt;
    if (spawnTimer >= nextSpawnGap) {
      spawnTimer = 0;
      nextSpawnGap = Math.max(0.65, 1.3 - distance / 900);
      spawnObstacle();
    }

    coinSpawnTimer += dt;
    if (coinSpawnTimer >= nextCoinGap) {
      coinSpawnTimer = 0;
      nextCoinGap = 1.1 + Math.random() * 1.2;
      spawnCoinArc();
    }

    const playerBox = getPlayerBox();
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed * dt;
      if (o.x + o.w < -20) { obstacles.splice(i, 1); continue; }
      if (intersects(playerBox, getObstacleBox(o))) {
        endRun();
        return;
      }
    }

    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      c.x -= speed * dt;
      c.spin += dt * 6;
      if (c.x < -20) { coins.splice(i, 1); continue; }
      if (!c.collected) {
        const cBox = { x: c.x - c.r, y: c.y - c.r, w: c.r * 2, h: c.r * 2 };
        if (intersects(playerBox, cBox)) {
          c.collected = true;
          coinCount++;
          document.getElementById('hud-coins').textContent = coinCount;
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
      }
    }
    coins = coins.filter(c => !c.collected || c.x > -20);

    document.getElementById('hud-score').textContent = Math.floor(distance);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawGround();
    obstacles.forEach(drawObstacle);
    coins.forEach(drawCoin);
    drawPlayer();
  }

  function loop(ts) {
    if (!running) return;
    if (!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    if (!running) return;
    render();
    raf = requestAnimationFrame(loop);
  }

  function startRun() {
    resetGame();
    running = true;
    lastTime = 0;
    showScreen('none');
    document.getElementById('hud').classList.add('active');
    const hint = document.getElementById('swipe-hint');
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; }, 2800);
    raf = requestAnimationFrame(loop);
  }

  function endRun() {
    running = false;
    cancelAnimationFrame(raf);
    document.getElementById('hud').classList.remove('active');

    const finalScore = Math.floor(distance);
    let prevBest;
    try {
      prevBest = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    } catch (e) { prevBest = best; }
    if (finalScore > prevBest) {
      best = finalScore;
      try { localStorage.setItem(STORAGE_KEY, String(best)); } catch (e) {}
    } else {
      best = prevBest;
    }

    document.getElementById('result-score').textContent = finalScore;
    document.getElementById('result-best').innerHTML = `Best: <strong>${best}m</strong>`;
    document.getElementById('result-coins').innerHTML = `Coins gathered: <strong>${coinCount}</strong>`;
    document.getElementById('menu-best').textContent = `BEST: ${best}M`;

    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    showScreen('screen-result');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (id !== 'none') document.getElementById(id).classList.add('active');
  }

  document.getElementById('btn-start').addEventListener('click', startRun);
  document.getElementById('btn-retry').addEventListener('click', startRun);
  document.getElementById('btn-menu').addEventListener('click', () => showScreen('screen-menu'));

  render();
})();
</script>
</body>
</html>
