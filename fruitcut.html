const gc    = document.getElementById('gc');

/* ── PERSONAL BEST ────────────────────────────────────────── */
const PB_KEY = 'bwlya_prasad_v4';

/* ════════════════════════════════════════════════════════════
   AUDIO ENGINE — pre-warmed, zero-latency sounds
   ════════════════════════════════════════════════════════════ */
let _ac = null;

function initAudio(){
    try{
        _ac = new (window.AudioContext || window.webkitAudioContext)();
        /* Silent buffer unlocks AudioContext immediately */
        const b = _ac.createBuffer(1,1,22050);
        const s = _ac.createBufferSource(); s.buffer = b;

}

function ac(){ return _ac; }

/* Slice — sawtooth sweep downward */
function sfxSlice(){
    try{
        const a = ac(); if(!a) return;
        const o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination); o.type = 'sawtooth';
        o.frequency.setValueAtTime(920, a.currentTime);
        o.frequency.exponentialRampToValueAtTime(95, a.currentTime + .07);
        g.gain.setValueAtTime(.22, a.currentTime);
        g.gain.exponentialRampToValueAtTime(.001, a.currentTime + .09);
        o.start(); o.stop(a.currentTime + .1);
    }catch(e){}
}

/* Combo — ascending tones */
function sfxCombo(lvl){
    try{
        const a = ac(); if(!a) return;
        [523,659,784,1047].slice(0, Math.min(lvl,4)).forEach((f,i) => {
            const o = a.createOscillator(), g = a.createGain();
            o.connect(g); g.connect(a.destination);
            o.type = 'sine'; o.frequency.value = f;
            const t = a.currentTime + i * .065;
            g.gain.setValueAtTime(.18, t);
            g.gain.exponentialRampToValueAtTime(.001, t + .17);
            o.start(t); o.stop(t + .22);
        });
    }catch(e){}
}

/* Bomb — fire crackle + rumble */
function sfxBomb(){
    try{
        const a = ac(); if(!a) return;
        const n   = a.sampleRate * .65;
        const buf = a.createBuffer(1, Math.floor(n), a.sampleRate);
        const d   = buf.getChannelData(0);
        for(let i = 0; i < d.length; i++)
            d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.1);
        const src = a.createBufferSource(); src.buffer = buf;
        const flt = a.createBiquadFilter();
        flt.type = 'bandpass'; flt.frequency.value = 320; flt.Q.value = .75;
        const g1  = a.createGain();
        g1.gain.setValueAtTime(.58, a.currentTime);
        g1.gain.exponentialRampToValueAtTime(.001, a.currentTime + .65);
        src.connect(flt); flt.connect(g1); g1.connect(a.destination);
        src.start(); src.stop(a.currentTime + .7);
        /* low rumble */
        const r = a.createOscillator(), gr = a.createGain();
        r.connect(gr); gr.connect(a.destination); r.type = 'sawtooth';
        r.frequency.setValueAtTime(90, a.currentTime);
        r.frequency.exponentialRampToValueAtTime(15, a.currentTime + .5);
        gr.gain.setValueAtTime(.35, a.currentTime);
        gr.gain.exponentialRampToValueAtTime(.001, a.currentTime + .55);
        r.start(); r.stop(a.currentTime + .6);
    }catch(e){}
}

/* Miss — sad descending tone */
function sfxMiss(){
    try{
        const a = ac(); if(!a) return;
        const o = a.createOscillator(), g = a.createGain();

/* ════════════════════════════════════════════════════════════

   Add/remove fruits here: emoji, juice colour, splash colour

const FRUITS = [

    {e:'🍊', j:'#d35400', s:'#e67e22'},   // Orange

/* ════════════════════════════════════════════════════════════

let playing    = false;
let score      = 0;
let lives      = 3;
let combo      = 0;

let coins      = 0;

let halves    = [];    /* sliced fruit halves */
let particles = [];    /* juice splatter */
let texts     = [];    /* floating score labels */
let trail     = [];    /* current swipe trail */

/* ── HELPERS ─────────────────────────────────────────────── */
const rnd  = (a, b) => a + Math.random() * (b - a);
const pick = arr   => arr[Math.floor(Math.random() * arr.length)];

/* Line-segment vs circle — core slice-collision math */
function lhc(ax, ay, bx, by, cx, cy, r){
    const dx = bx-ax, dy = by-ay, fx = ax-cx, fy = ay-cy;
    const a = dx*dx + dy*dy;
    if(!a) return false;
    const b    = 2*(fx*dx + fy*dy);
    const c    = fx*fx + fy*fy - r*r;
    let   disc = b*b - 4*a*c;
    if(disc < 0) return false;
    disc = Math.sqrt(disc);
    const t1 = (-b - disc) / (2*a);
    const t2 = (-b + disc) / (2*a);
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1);
}

/* Canvas rounded-rectangle path helper */
function rrect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);       ctx.quadraticCurveTo(x+w, y,   x+w, y+r);
    ctx.lineTo(x+w, y+h-r);     ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);       ctx.quadraticCurveTo(x,   y+h, x,   y+h-r);
    ctx.lineTo(x, y+r);         ctx.quadraticCurveTo(x,   y,   x+r, y);
    ctx.closePath();
}

/* ════════════════════════════════════════════════════════════
   SPAWNING
   ════════════════════════════════════════════════════════════ */
function spawnItem(){
    /* Bomb chance starts at 10%, rises to 33% as game progresses
       EDIT the two numbers below to tune difficulty:            */
    const bombChance = Math.min(.10 + gameTime * .000085, .33);
    const isBomb     = Math.random() < bombChance;
    const speed      = rnd(13, 19) + gameTime * .003;

    items.push({
        type : isBomb ? 'bomb' : 'fruit',
        fr   : isBomb ? null  : pick(FRUITS),
        x    : rnd(W * .12, W * .88),
        y    : H + 65,
        vx   : rnd(-3.5, 3.5),
        vy   : -speed,
        rot  : rnd(0, Math.PI * 2),
        rotV : rnd(-.11, .11),
        r    : 46,           /* hitbox radius */
        done : false,
        gph  : rnd(0, Math.PI * 2), /* bomb glow animation phase */
        fire : [],            /* bomb fire micro-particles */
        sf   : 16,            /* spawn flash frames */
    });
}

/* ── AMBIENT BACKGROUND DUST ────────────────────────────── */
function initAmbients(){
    ambients = [];
    for(let i = 0; i < 18; i++){
        ambients.push({
            x: rnd(0, W), y: rnd(0, H),
            vx: rnd(-.18, .18), vy: rnd(-.35, -.12),
            sz: rnd(1, 2.5), a: rnd(.08, .26), h: rnd(35, 50)
        });
    }
}

function updateAmbients(){
    ambients.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if(p.y < -5){ p.y = H + 5; p.x = rnd(0, W); }
    });
}

function drawAmbients(){
    ambients.forEach(p => {
        ctx.globalAlpha = p.a;
        ctx.fillStyle = `hsl(${p.h},75%,60%)`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
}

/* ════════════════════════════════════════════════════════════
   SLICE HANDLING & EFFECTS
   ════════════════════════════════════════════════════════════ */
function handleSlice(it){
    if(it.done) return;
    it.done = true;

    if(it.type === 'bomb'){
        /* ── BOMB HIT ── */
        sfxBomb();
        shake(24, 30);
        flashColor = '#ff0000'; flashAlpha = .40;
        burst(it.x, it.y, '#ff4400', '#ff2200', 40);
        burst(it.x, it.y, '#ff9900', '#ffee00', 22);
        addTxt(it.x, it.y, '💥 BOMB!', '#ff3333', 34);
        lives = Math.max(0, lives - 1);
        combo = 0; comboTimer = 0; fever = false;
        if(!lives) endGame();
    } else {
        /* ── FRUIT HIT ── */
        sfxSlice();
        combo++; comboTimer = 95;
        fever = combo >= 8;

        /* Score multiplier: fever=5×, frenzy=4×, combo4=2.5×, combo2=1.5×, else 1× */
        const mult = fever ? 5 : combo>=6 ? 4 : combo>=4 ? 2.5 : combo>=2 ? 1.5 : 1;
        const pts  = Math.max(1, Math.floor(mult));
        score += pts; coins += pts;

        flashColor = '#ffffff'; flashAlpha = .06;
        burst(it.x, it.y, it.fr.s, '#ffffff', 22);
        spawnHalves(it);

        /* Combo-tier feedback */
        if(combo === 8){
            sfxCombo(4);
            addTxt(it.x, it.y - 58, '🔥 FEVER!', '#ff6600', 36);
            shake(7, 14);
        } else if(combo >= 6){
            sfxCombo(4);
            addTxt(it.x, it.y - 52, `🔥 ${combo}× FRENZY`, '#ffd700', 32);
            shake(5, 10);
        } else if(combo >= 4){
            sfxCombo(3);
            addTxt(it.x, it.y - 36, `⚡ ${combo}× COMBO`, '#f0a500', 27);
        } else if(combo >= 2){
            addTxt(it.x, it.y - 22, `${combo}×`, '#f0a500', 23);
        } else {
            addTxt(it.x, it.y, `+${pts}`, '#ffd166', 20);
        }
    }
}

/* Two emoji halves fly apart perpendicular to the swipe */
function spawnHalves(it){
    const len = Math.sqrt(sliceVX*sliceVX + sliceVY*sliceVY) || 1;
    const nx  = -sliceVY / len;
    const ny  =  sliceVX / len;
    const spd = rnd(6, 13);
    for(let i = 0; i < 2; i++){
        const d = i ? -1 : 1;
        halves.push({
            e   : it.fr.e,
            x   : it.x, y: it.y,
            vx  : nx * spd * d + rnd(-2, 2),
            vy  : ny * spd * d - rnd(4, 9),
            rot : it.rot, rotV: d * rnd(.09, .18),
            a   : 1, sz: it.r, h: i,
        });
    }
}

/* Juice / explosion burst */
function burst(x, y, c1, c2, n){
    for(let i = 0; i < n; i++){
        const ang = rnd(0, Math.PI*2), spd = rnd(5, 16);
        particles.push({
            x, y,
            vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - rnd(2, 6),
            sz: rnd(3, 9), c: Math.random() < .55 ? c1 : c2, a: 1,
        });
    }
}

const addTxt   = (x, y, t, c, sz) => texts.push({x, y, t, c, sz, a: 1});
const shake    = (a, d) => { shakeAmt = a; shakeDur = d; };

/* Bomb fire micro-particles — drawn BEHIND the bomb */
function updateBombFire(it){
    if(Math.random() < .72){
        const ang = rnd(0, Math.PI*2), sp = it.r * rnd(.3, .72);
        it.fire.push({
            x  : it.x + Math.cos(ang) * sp,
            y  : it.y + Math.sin(ang) * sp,
            vx : rnd(-1.5, 1.5), vy: rnd(-4, -1.5),
            sz : rnd(6, 16), a: rnd(.7, 1), h: rnd(10, 42),
        });
    }
    for(let i = it.fire.length - 1; i >= 0; i--){
        const f = it.fire[i];
        f.x += f.vx; f.y += f.vy; f.a -= .04; f.sz *= .955;
        if(f.a <= .04) it.fire.splice(i, 1);
    }
}

/* ════════════════════════════════════════════════════════════
   UPDATE — delta-time based (consistent on all devices)
   ════════════════════════════════════════════════════════════ */
const G = .27;   /* gravity per frame at 60 fps */

function update(dt){
    gameTime++; spawnTimer++;

    /* Spawn interval shrinks over time (game gets harder) */
    spawnEvery = Math.max(26, 75 - Math.floor(gameTime / 180) * 4);

    if(spawnTimer >= spawnEvery){
        spawnTimer = 0; spawnItem();
        if(gameTime > 350 && Math.random() < .38) spawnItem(); /* double spawn */
        if(gameTime > 800 && Math.random() < .25) spawnItem(); /* triple spawn */
    }

    /* Items */
    for(let i = items.length - 1; i >= 0; i--){
        const it = items[i];
        if(it.done){ items.splice(i, 1); continue; }
        it.vy += G * dt; it.x += it.vx * dt; it.y += it.vy * dt;
        it.rot += it.rotV * dt;
        if(it.sf > 0) it.sf--;
        if(it.type === 'bomb') updateBombFire(it);
        if(it.y > H + 90){
            if(it.type === 'fruit'){
                lives = Math.max(0, lives - 1); sfxMiss();
                flashColor = '#ff0000'; flashAlpha = .18;
                addTxt(it.x, H - 62, 'MISSED!', '#ff5555', 20);
                combo = 0; comboTimer = 0; fever = false;
                if(!lives) endGame();
            }
            items.splice(i, 1);
        }
    }

    /* Halves */
    for(let i = halves.length - 1; i >= 0; i--){
        const h = halves[i];
        h.vy += G * dt; h.x += h.vx * dt; h.y += h.vy * dt;
        h.rot += h.rotV * dt; h.a -= .020;
        if(h.a <= 0 || h.y > H + 100) halves.splice(i, 1);
    }

    /* Particles */
    for(let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += .24 * dt; p.a -= .022;
        if(p.a <= 0) particles.splice(i, 1);
    }

    /* Floating texts */
    for(let i = texts.length - 1; i >= 0; i--){
        const t = texts[i];
        t.y -= 2.3; t.a -= .017;
        if(t.a <= 0) texts.splice(i, 1);
    }

    trail = trail.slice(-28);
    if(comboTimer > 0) comboTimer--; else if(combo > 0){ combo = 0; fever = false; }
    if(shakeDur  > 0) shakeDur--;    else shakeAmt = 0;
    if(flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - .032);
    updateAmbients();
}

/* ════════════════════════════════════════════════════════════
   DRAW FUNCTIONS
   ════════════════════════════════════════════════════════════ */

/* Background — responsive to combo and fever */
function drawBG(){
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, fever ? '#140804' : '#0c0a05');
    bg.addColorStop(1, fever ? '#1c0904' : '#080604');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    /* Combo-reactive warm glow at bottom */
    if(combo > 0){
        const ci = Math.min(combo / 8, 1) * .22;
        const cg = ctx.createRadialGradient(W/2, H, 0, W/2, H, H * .78);
        cg.addColorStop(0, `rgba(200,70,0,${ci})`);
        cg.addColorStop(1, 'transparent');
        ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);
    }

    /* FEVER MODE: pulsing gold screen edges */
    if(fever){
        const fa = .16 + Math.sin(gameTime * .13) * .07;
        const top = ctx.createLinearGradient(0, 0, 0, 58);
        top.addColorStop(0, `rgba(240,165,0,${fa})`); top.addColorStop(1, 'transparent');
        ctx.fillStyle = top; ctx.fillRect(0, 0, W, 58);

        const bot = ctx.createLinearGradient(0, H-58, 0, H);
        bot.addColorStop(0, 'transparent'); bot.addColorStop(1, `rgba(240,165,0,${fa})`);
        ctx.fillStyle = bot; ctx.fillRect(0, H-58, W, 58);

        const lft = ctx.createLinearGradient(0, 0, 58, 0);
        lft.addColorStop(0, `rgba(240,165,0,${fa})`); lft.addColorStop(1, 'transparent');
        ctx.fillStyle = lft; ctx.fillRect(0, 0, 58, H);

        const rgt = ctx.createLinearGradient(W-58, 0, W, 0);
        rgt.addColorStop(0, 'transparent'); rgt.addColorStop(1, `rgba(240,165,0,${fa})`);
        ctx.fillStyle = rgt; ctx.fillRect(W-58, 0, 58, H);
    }
}

/* Bomb fire behind bombs (absolute coordinates, no rotation) */
function drawBombFire(){
    items.forEach(it => {
        if(it.type !== 'bomb' || it.done) return;
        it.fire.forEach(f => {
            ctx.globalAlpha = f.a * .9;
            ctx.fillStyle   = `hsl(${f.h},100%,55%)`;
            ctx.beginPath(); ctx.arc(f.x, f.y, f.sz, 0, Math.PI*2); ctx.fill();
        });
    });
    ctx.globalAlpha = 1;
}

/* Fruit — large, shadowed emoji with spawn flash */
function drawFruit(it){
    if(it.sf > 0){
        ctx.globalAlpha = (it.sf / 16) * .32;
        ctx.fillStyle   = 'rgba(255,255,200,.3)';
        ctx.beginPath(); ctx.arc(0, 0, it.r * 1.5, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }
    ctx.shadowBlur   = 22; ctx.shadowColor = 'rgba(0,0,0,.75)';
    ctx.font         = `${it.r * 1.85}px sans-serif`;
    ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(it.fr.e, 0, 0);
    ctx.shadowBlur   = 0;
}

/* Bomb — dark crimson, 8-crack glowing veins, animated fuse & spark */
function drawBomb(it){
    const r  = it.r;
    const T  = Date.now() / 1000;
    const pl = (Math.sin(T * 8 + it.gph) + 1) / 2;  /* pulse 0–1 */

    /* Spawn flash — bright red halo */
    if(it.sf > 0){
        ctx.globalAlpha = (it.sf / 16) * .72;
        ctx.fillStyle   = 'rgba(255,0,0,.55)';
        ctx.beginPath(); ctx.arc(0, 0, r * 2.9, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    /* Large outer fire aura */
    const au = ctx.createRadialGradient(0, 0, r*.5, 0, 0, r*2.3);
    au.addColorStop(0,   `rgba(255,48,0,${.34 + pl*.28})`);
    au.addColorStop(.5,  `rgba(180,16,0,${.16 + pl*.14})`);
    au.addColorStop(1,   'transparent');
    ctx.fillStyle = au; ctx.beginPath(); ctx.arc(0, 0, r*2.3, 0, Math.PI*2); ctx.fill();

    /* Crimson-black bomb body */
    const bd = ctx.createRadialGradient(-r*.32, -r*.32, 0, 0, 0, r);
    bd.addColorStop(0,  '#460000');
    bd.addColorStop(.5, '#210000');
    bd.addColorStop(1,  '#090000');
    ctx.fillStyle = bd; ctx.shadowBlur = 22;
    ctx.shadowColor = `rgba(255,16,0,${.40 + pl*.42})`;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    /* 8-way glowing crack veins */
    ctx.strokeStyle = `rgba(255,46,0,${.42 + pl*.46})`; ctx.lineWidth = 1.7;
    for(let i = 0; i < 8; i++){
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * r * .80, Math.sin(a) * r * .80);
        ctx.stroke();
    }

    /* ☠️ skull — stays upright while body rotates */
    ctx.rotate(-it.rot);
    ctx.font = `${r * 1.12}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('☠️', 0, 2);
    ctx.rotate(it.rot);

    /* Wobbly animated fuse */
    const fy = -r - 16 - Math.sin(T * 10) * 5;
    ctx.strokeStyle = '#8b5e3c'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(r * .22, -r * .82);
    ctx.quadraticCurveTo(r*.68 + Math.cos(T*9)*5, -r-9, r*.38, fy);
    ctx.stroke();

    /* Flickering spark at fuse tip */
    const sr = 4 + Math.sin(T * 25) * 2;
    ctx.shadowBlur  = 14; ctx.shadowColor = '#ff8800';
    ctx.fillStyle   = `rgba(255,${140 + Math.floor(pl*115)},0,${.72 + Math.sin(T*28)*.28})`;
    ctx.beginPath(); ctx.arc(r*.38, fy, sr, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur  = 0;
}

/* All items in their individual rotation contexts */
function drawItems(){
    items.forEach(it => {
        if(it.done) return;
        ctx.save();
        ctx.translate(it.x, it.y);
        ctx.rotate(it.rot);
        it.type === 'fruit' ? drawFruit(it) : drawBomb(it);
        ctx.restore();
    });
}

/* Sliced halves — each shows only its half via rectangle clip */
function drawHalves(){
    halves.forEach(h => {
        ctx.save(); ctx.globalAlpha = h.a;
        ctx.translate(h.x, h.y); ctx.rotate(h.rot);
        ctx.beginPath();
        h.h === 0
            ? ctx.rect(-h.sz*2, -h.sz*2, h.sz*2, h.sz*4)   // left half
            : ctx.rect(0,       -h.sz*2, h.sz*2, h.sz*4);  // right half
        ctx.clip();
        ctx.font = `${h.sz * 1.85}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(h.e, 0, 0);
        ctx.restore();
    });
}

/* Juice splatter drops */
function drawParticles(){
    particles.forEach(p => {
        ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
}

/* Golden slash trail with glowing tip */
function drawTrail(){
    if(trail.length < 2) return;
    for(let i = 1; i < trail.length; i++){
        const t     = i / trail.length;
        const isTip = i === trail.length - 1;
        ctx.beginPath();
        ctx.moveTo(trail[i-1].x, trail[i-1].y);
        ctx.lineTo(trail[i].x,   trail[i].y);
        ctx.strokeStyle = `rgba(255,215,55,${t * .97})`;
        ctx.lineWidth   = t * 8;
        ctx.lineCap     = 'round';
        if(isTip){ ctx.shadowBlur = 14; ctx.shadowColor = 'rgba(255,200,0,.88)'; }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

/* Floating score/combo texts in Cinzel font */
function drawTexts(){
    texts.forEach(tx => {
        ctx.globalAlpha  = tx.a;
        ctx.fillStyle    = tx.c;
        ctx.shadowBlur   = 15; ctx.shadowColor = tx.c;
        ctx.font         = `bold ${tx.sz}px 'Cinzel',serif`;
        ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(tx.t, tx.x, tx.y);
        ctx.shadowBlur   = 0;
    });
    ctx.globalAlpha = 1;
}

/* HUD — score, lives, combo, meter bar, difficulty */
function drawHUD(){
    /* Score box */
    ctx.fillStyle = 'rgba(0,0,0,.52)'; rrect(10, 10, 134, 57, 9); ctx.fill();
    ctx.strokeStyle = 'rgba(240,165,0,.28)'; ctx.lineWidth = .5; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.38)';
    ctx.font = '9px Inter,system-ui'; ctx.textAlign = 'left';
    ctx.fillText('SCORE', 23, 27);
    ctx.fillStyle = fever ? '#ff6600' : '#f0a500';
    ctx.font = 'bold 24px Inter,system-ui';
    ctx.fillText(score.toLocaleString('en-IN'), 23, 52);

    /* Lives */
    let ls = ''; for(let i = 0; i < 3; i++) ls += i < lives ? '❤️' : '🖤';
    ctx.font = '24px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(ls, W - 12, 48);

    /* Combo ribbon */
    if(combo >= 2 && comboTimer > 0){
        ctx.globalAlpha = Math.min(1, comboTimer / 30);
        const sz  = Math.min(18 + combo * 2, 38);
        const col = fever ? '#ff6600' : combo >= 6 ? '#ffd700' : '#f0a500';
        ctx.font         = `bold ${sz}px 'Cinzel',serif`;
        ctx.fillStyle    = col;
        ctx.shadowBlur   = 20; ctx.shadowColor = col;
        ctx.textAlign    = 'center';
        ctx.fillText(`${combo}× COMBO`, W/2, 44);
        ctx.shadowBlur   = 0; ctx.globalAlpha = 1;
    }

    /* Left-side vertical combo meter bar */
    if(combo >= 2){
        const mh   = 100;
        const my   = (H - mh) / 2;
        const fill = Math.min(combo / 10, 1);
        ctx.fillStyle = 'rgba(0,0,0,.44)'; ctx.fillRect(8, my, 7, mh);
        const mg = ctx.createLinearGradient(0, my+mh, 0, my);
        mg.addColorStop(0, fever ? '#ff4400' : '#f0a500');
        mg.addColorStop(1, fever ? '#ff0000' : '#ffd700');
        ctx.fillStyle = mg; ctx.fillRect(8, my + mh - fill*mh, 7, fill*mh);
        ctx.strokeStyle = 'rgba(240,165,0,.28)'; ctx.lineWidth = .5;
        ctx.strokeRect(8, my, 7, mh);
    }

    /* Difficulty label */
    if(gameTime > 60){
        const d = gameTime < 400  ? 'ACOLYTE'
                : gameTime < 800  ? 'DEVOTEE'
                : gameTime < 1400 ? 'ORACLE'
                : 'LEGEND  ✦';
        ctx.globalAlpha = .28; ctx.font = '9px Inter,system-ui';
        ctx.textAlign   = 'center'; ctx.fillStyle = '#f0a500';
        ctx.fillText(d, W/2, H - 10);
        ctx.globalAlpha = 1;
    }

    /* Screen flash overlay (red=bomb/miss, white=slice) */
    if(flashAlpha > .01){
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle   = flashColor || '#fff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }
}

/* ════════════════════════════════════════════════════════════
   MAIN GAME LOOP
   ════════════════════════════════════════════════════════════ */
function loop(ts){
    if(!playing) return;
    /* Delta-time: cap at 2 frames to stop physics spiral on lag */
    const dt = lastTS ? Math.min((ts - lastTS) / 16.667, 2) : 1;
    lastTS = ts;

    ctx.save();
    /* Screen shake via random translate */
    if(shakeDur > 0){
        const s = shakeAmt * (shakeDur / 30);
        ctx.translate(rnd(-s, s), rnd(-s, s));
    }

    drawBG();
    drawAmbients();
    drawBombFire();    /* fire BEHIND bombs */
    drawHalves();
    drawItems();
    drawTrail();
    drawParticles();
    drawTexts();
    drawHUD();

    update(dt);

    ctx.restore();
    requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════════════════════
   INPUT — PointerEvent API
   ────────────────────────────────────────────────────────────
   Why PointerEvent:
   · Single handler for mouse, touch, and stylus
   · Lower OS-level latency than split touch/mouse
   · setPointerCapture: pointer stays on canvas even off-screen
   · activePID guard: ignores second finger, prevents multi-touch bugs
   ════════════════════════════════════════════════════════════ */
gc.addEventListener('pointerdown', e => {
    e.preventDefault();
    if(activePID !== null) return;            /* ignore second finger */
    activePID = e.pointerId;
    gc.setPointerCapture(e.pointerId);        /* lock pointer to canvas */
    dragging = true;
    trail = [{x: e.clientX, y: e.clientY}];
    sliceVX = 0; sliceVY = 0;
}, {passive: false});

gc.addEventListener('pointermove', e => {
    e.preventDefault();
    if(!dragging || !playing || e.pointerId !== activePID) return;

    const x    = e.clientX, y = e.clientY;
    const last = trail[trail.length - 1] || {x, y};
    sliceVX    = x - last.x;
    sliceVY    = y - last.y;
    const spd  = Math.sqrt(sliceVX*sliceVX + sliceVY*sliceVY);

    /* TRAIL INTERPOLATION: insert sub-points on fast swipes
       so no fruit hitbox is ever "jumped over"               */
    const steps = Math.max(1, Math.ceil(spd / 10));
    for(let s = 1; s <= steps; s++){
        trail.push({
            x: last.x + sliceVX * (s / steps),
            y: last.y + sliceVY * (s / steps),
        });
    }
    if(trail.length > 40) trail = trail.slice(-40);

    /* COLLISION: min-speed 3px prevents resting-touch slices
       Speed-scaled hitbox: expands up to +20px on fast swipes */
    if(spd > 3){
        const p1 = trail[trail.length - 2];
        const p2 = trail[trail.length - 1];
        if(p1) items.forEach(it => {
            if(it.done) return;
            const hr = it.r + Math.min(spd * .35, 20);
            if(lhc(p1.x, p1.y, p2.x, p2.y, it.x, it.y, hr)) handleSlice(it);
        });
    }
}, {passive: false});

gc.addEventListener('pointerup', e => {
    e.preventDefault();
    if(e.pointerId !== activePID) return;
    activePID = null; dragging = false; trail = [];
}, {passive: false});

gc.addEventListener('pointercancel', e => {
    if(e.pointerId !== activePID) return;
    activePID = null; dragging = false; trail = [];
});

/* ════════════════════════════════════════════════════════════
   SCREEN PARTICLE ANIMATION
   Gold smoke particles matching the Baba image aesthetic.
   Runs only on start/game-over screens, hidden during gameplay.
   ════════════════════════════════════════════════════════════ */
const sPts = [];

function initSP(){
    sPts.length = 0;
    for(let i = 0; i < 65; i++){
        sPts.push({
            x  : rnd(0, W), y: rnd(0, H),
            vx : rnd(-.28, .28), vy: rnd(-.85, -.25),
            sz : rnd(1, 5), a: rnd(.14, .68), h: rnd(32, 52)
        });
    }
}

function runSP(){
    spCtx.clearRect(0, 0, spc.width, spc.height);
    sPts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if(p.y < -8){ p.y = spc.height + 8; p.x = rnd(0, spc.width); }
        if(p.x < -8) p.x = spc.width  + 8;
        if(p.x > spc.width + 8) p.x = -8;
        /* Fade near top so particles dissolve gracefully */
        const fade = Math.min(p.y / spc.height * 2.5, 1);
        spCtx.globalAlpha = p.a * fade;
        spCtx.fillStyle   = `hsl(${p.h},88%,63%)`;
        spCtx.beginPath(); spCtx.arc(p.x, p.y, p.sz, 0, Math.PI*2); spCtx.fill();
    });
    spCtx.globalAlpha = 1;
    if(!playing) requestAnimationFrame(runSP);
}

/* ════════════════════════════════════════════════════════════
   GAME CONTROL
   ════════════════════════════════════════════════════════════ */
function startGame(){
    document.getElementById('SS').classList.add('off');
    spc.style.display = 'none';      /* hide particles during gameplay */
    initAudio();                     /* pre-warm audio for zero latency */

    /* Reset all state */
    score = 0; lives = 3; combo = 0; comboTimer = 0; coins = 0;
    gameTime = 0; spawnTimer = 0; spawnEvery = 75; lastTS = 0;
    items = []; halves = []; particles = []; texts = []; trail = [];
    shakeAmt = 0; shakeDur = 0; dragging = false; activePID = null;
    flashColor = null; flashAlpha = 0; fever = false;

    initAmbients();
    playing = true;
    requestAnimationFrame(loop);
}

function endGame(){
    playing = false;

    /* Personal best check */
    const isBest = score > personalBest;
    if(isBest){ personalBest = score; localStorage.setItem(PB_KEY, personalBest); }

    document.getElementById('fSc').textContent = score.toLocaleString('en-IN');
    document.getElementById('fCn').textContent  = `🪙 ${coins} coins earned`;

    const pa = document.getElementById('pbArea');
    if(isBest){
        pa.innerHTML = '<div class="pb-badge">✦ NEW PERSONAL BEST ✦</div>';
    } else if(personalBest > 0){
        pa.innerHTML = `<div class="pb-prev">Personal best: ${personalBest.toLocaleString('en-IN')}</div>`;
    } else {
        pa.innerHTML = '';
    }

    document.getElementById('GO').classList.remove('off');
    spc.style.display = 'block';    /* show particles on game over */
    initSP(); requestAnimationFrame(runSP);

    /* ── SAVE COINS TO BACKEND ──────────────────────────────
       Uncomment once your Vercel API is live:
       fetch('/api/earn', {
         method: 'POST',
         headers: {'Content-Type':'application/json'},
         body: JSON.stringify({ initData: TG?.initData||'', game:'prasad', coinsEarned: coins })
       });
    ──────────────────────────────────────────────────────── */
}

function restartGame(){
    document.getElementById('GO').classList.add('off');
    startGame();
}

/* ── BOOT ─────────────────────────────────────────────────── */
/* Initial canvas fill so there's no white flash on load */
ctx.fillStyle = '#0a0804'; ctx.fillRect(0, 0, W, H);

/* Start screen particles immediately */
initSP();
requestAnimationFrame(runSP);
</script>
