<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prasad Cutting — $BAWALIYA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   $BAWALIYA — PRASAD CUTTING  v3.0  SHARP EDITION
   EDIT colours in :root only.
   ═══════════════════════════════════════════════════ */
:root{--gold:#f0a500;--gold-lt:#ffd166;--dark:#0a0804}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);
  user-select:none;-webkit-user-select:none;
  font-family:'Segoe UI',system-ui,sans-serif}
#c{display:block;width:100%;height:100%;
  touch-action:none;cursor:none;   /* cursor:none removes OS pointer lag */
  will-change:transform}           /* GPU-composited layer = zero blit lag */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;padding:32px;
  background:rgba(4,3,1,.94);backdrop-filter:blur(6px);z-index:20}
.scr.off{display:none}
.ico{font-size:54px;animation:br 2.8s ease-in-out infinite}
.ttl{font-size:27px;font-weight:700;color:var(--gold);text-align:center;
  letter-spacing:.02em;animation:gl 2.2s ease-in-out infinite}
.sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;
  line-height:1.75;max-width:270px}
.sc{font-size:54px;font-weight:700;color:#fff;line-height:1}
.cn{font-size:17px;color:var(--gold);font-weight:600}
.div{width:56px;height:.5px;background:rgba(240,165,0,.3)}
.lv{display:flex;gap:6px;font-size:26px}
.btn{padding:13px 36px;background:var(--gold);color:#0a0804;font-size:14px;
  font-weight:700;border:none;border-radius:10px;cursor:pointer;
  letter-spacing:.08em;text-transform:uppercase;min-width:175px;
  transition:transform .1s,background .1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.93)}
.btn:hover{background:var(--gold-lt)}
.bk{padding:9px 22px;background:transparent;color:rgba(255,255,255,.32);
  font-size:12px;border:.5px solid rgba(255,255,255,.12);border-radius:8px;
  cursor:pointer;text-decoration:none;display:inline-block;
  transition:color .15s,border-color .15s}
.bk:hover{color:var(--gold);border-color:rgba(240,165,0,.3)}
@keyframes br{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes gl{0%,100%{text-shadow:0 0 18px rgba(240,165,0,.3)}
              50%{text-shadow:0 0 30px rgba(240,165,0,.65)}}
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="scr" id="SS">
  <div class="ico">🗡️</div>
  <div class="ttl">Prasad Cutting</div>
  <div class="sub">Slice the sacred offerings to earn Baba's blessing.<br>
    Dodge the fire-bomb — one touch costs a life.</div>
  <div class="div"></div>
  <div class="lv">❤️ ❤️ ❤️</div>
  <button class="btn" onclick="startGame()">Begin the Ritual</button>
  <a href="index.html" class="bk">← Back to Temple</a>
</div>

<!-- GAME OVER SCREEN -->
<div class="scr off" id="GS">
  <div class="ico">💀</div>
  <div class="ttl">The Temple Falls Silent</div>
  <div class="sub">The ritual is broken</div>
  <div class="div"></div>
  <div class="sc" id="fSc">0</div>
  <div class="cn" id="fCn">🪙 0 coins earned</div>
  <button class="btn" onclick="restartGame()">Try Again</button>
  <a href="index.html" class="bk">← Back to Temple</a>
</div>

<canvas id="c"></canvas>

<script>
/* ═══════════════════════════════════════════════════════════════
   SHARP EDITION — What changed from v2.0
   ─────────────────────────────────────────────────────────────
   1. PointerEvent API replaces split mouse/touch → single path,
      lower OS-level latency, works on stylus too.
   2. setPointerCapture → pointer stays locked to canvas even if
      the finger drifts off-screen. No more "lost slice".
   3. initAudio() pre-warms AudioContext + plays silent buffer at
      game start → ZERO first-sound latency. No audio stutter.
   4. Trail interpolation → fast swipes generate intermediate
      points so no hitbox can be "skipped" by a speedy finger.
   5. Speed-scaled hitbox → expand by up to +20 px at high speed.
      Near-misses on fast slices now register correctly.
   6. Min-speed threshold (>3 px) → static finger never triggers
      a false slice.
   7. Delta-time physics → physics is frame-rate independent.
      60 fps or 120 fps — same feel.
   8. Higher burst velocity (4–13) → juice splatter feels instant
      and satisfying rather than sluggish.
   9. cursor:none on canvas → OS cursor hidden = no double-cursor
      visual lag artefact on desktop/web.
  10. activePointerId guard → second finger is ignored, preventing
      accidental double-triggers on mobile.
   ═══════════════════════════════════════════════════════════════ */

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

let W, H;
function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const TG = window.Telegram?.WebApp;
if (TG){ TG.ready(); TG.expand(); }

/* ── AUDIO (pre-warmed at game start) ─────────────────────── */
let _ac = null;

function initAudio(){
  try{
    _ac = new (window.AudioContext || window.webkitAudioContext)();
    /* Silent-buffer unlock: forces AudioContext to the "running"
       state immediately so the FIRST real sound plays with 0 lag */
    const b = _ac.createBuffer(1,1,22050);
    const s = _ac.createBufferSource(); s.buffer = b;
    s.connect(_ac.destination); s.start(0); s.stop(0.001);
  }catch(e){}
}

function sfxSlice(){
  try{
    const a=_ac; if(!a) return;
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(850,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(100,a.currentTime+.07);
    g.gain.setValueAtTime(.22,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.09);
    o.start(); o.stop(a.currentTime+.1);
  }catch(e){}
}

function sfxCombo(lvl){
  try{
    const a=_ac; if(!a) return;
    [523,659,784,1047].slice(0,Math.min(lvl,4)).forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type='sine'; o.frequency.value=f;
      const t=a.currentTime+i*.06;
      g.gain.setValueAtTime(.17,t); g.gain.exponentialRampToValueAtTime(.001,t+.16);
      o.start(t); o.stop(t+.2);
    });
  }catch(e){}
}

/* BOMB — fire crackle + low rumble */
function sfxBomb(){
  try{
    const a=_ac; if(!a) return;
    const buf=a.createBuffer(1,Math.floor(a.sampleRate*.65),a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)
      d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.1);
    const src=a.createBufferSource(); src.buffer=buf;
    const flt=a.createBiquadFilter();
    flt.type='bandpass'; flt.frequency.value=320; flt.Q.value=.75;
    const g1=a.createGain();
    g1.gain.setValueAtTime(.55,a.currentTime);
    g1.gain.exponentialRampToValueAtTime(.001,a.currentTime+.65);
    src.connect(flt); flt.connect(g1); g1.connect(a.destination);
    src.start(); src.stop(a.currentTime+.7);
    const r=a.createOscillator(),gr=a.createGain();
    r.connect(gr); gr.connect(a.destination); r.type='sawtooth';
    r.frequency.setValueAtTime(90,a.currentTime);
    r.frequency.exponentialRampToValueAtTime(16,a.currentTime+.5);
    gr.gain.setValueAtTime(.32,a.currentTime);
    gr.gain.exponentialRampToValueAtTime(.001,a.currentTime+.55);
    r.start(); r.stop(a.currentTime+.6);
  }catch(e){}
}

function sfxMiss(){
  try{
    const a=_ac; if(!a) return;
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type='sine';
    o.frequency.setValueAtTime(240,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,a.currentTime+.32);
    g.gain.setValueAtTime(.17,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.35);
    o.start(); o.stop(a.currentTime+.38);
  }catch(e){}
}

/* ── FRUIT DATA — edit this array to add/remove fruits ─────── */
const FRUITS=[
  {e:'🍎',j:'#c0392b',s:'#e74c3c'},  // Apple
  {e:'🍊',j:'#d35400',s:'#e67e22'},  // Orange
  {e:'🍋',j:'#f39c12',s:'#f1c40f'},  // Lemon
  {e:'🍉',j:'#1d8348',s:'#27ae60'},  // Watermelon
  {e:'🍇',j:'#6c3483',s:'#9b59b6'},  // Grapes
  {e:'🍓',j:'#922b21',s:'#e74c3c'},  // Strawberry
  {e:'🥭',j:'#ca6f1e',s:'#f39c12'},  // Mango  ← Indian prasad
  {e:'🍌',j:'#d4ac0d',s:'#f1c40f'},  // Banana
  {e:'🥥',j:'#6e2f1a',s:'#a04000'},  // Coconut ← temple offering
  {e:'🍑',j:'#cb4335',s:'#e74c3c'},  // Peach
  {e:'🍍',j:'#b7950b',s:'#f1c40f'},  // Pineapple
];

/* ── GAME STATE ─────────────────────────────────────────────── */
let playing=false;
let score=0,lives=3,combo=0,comboTimer=0,coins=0;
let gameTime=0,spawnTimer=0,spawnEvery=75;
let items=[],halves=[],particles=[],texts=[],trail=[];
let shakeAmt=0,shakeDur=0;
let dragging=false,sliceVX=0,sliceVY=0;
let lastTS=0;              /* timestamp of previous frame */
let activePID=null;        /* active pointer ID (single-finger guard) */

/* ── HELPERS ────────────────────────────────────────────────── */
const rnd  = (a,b) => a+Math.random()*(b-a);
const pick = arr  => arr[Math.floor(Math.random()*arr.length)];

/* Line-segment vs circle — core slice-detection math */
function lhc(ax,ay,bx,by,cx,cy,r){
  const dx=bx-ax,dy=by-ay,fx=ax-cx,fy=ay-cy;
  const a=dx*dx+dy*dy; if(!a) return false;
  const b=2*(fx*dx+fy*dy), c=fx*fx+fy*fy-r*r;
  let disc=b*b-4*a*c; if(disc<0) return false;
  disc=Math.sqrt(disc);
  const t1=(-b-disc)/(2*a),t2=(-b+disc)/(2*a);
  return(t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

/* ── SPAWNING ───────────────────────────────────────────────── */
function spawnItem(){
  /* BOMB chance: 10% at start → max 32% over time
     EDIT: change these two numbers to tune difficulty */
  const bombChance = Math.min(.10 + gameTime*.000085, .32);
  const isBomb     = Math.random() < bombChance;
  const speed      = rnd(13,18) + gameTime*.003;

  items.push({
    type : isBomb ? 'bomb' : 'fruit',
    fr   : isBomb ? null : pick(FRUITS),
    x    : rnd(W*.12, W*.88),
    y    : H+65,
    vx   : rnd(-3.5,3.5),
    vy   : -speed,
    rot  : rnd(0,Math.PI*2),
    rotV : rnd(-.1,.1),
    r    : 44,          /* hitbox radius — larger = easier to slice */
    done : false,
    gph  : rnd(0,Math.PI*2),
    fire : [],
  });
}

/* ── SLICE HANDLER ──────────────────────────────────────────── */
function handleSlice(it){
  if(it.done) return; it.done=true;

  if(it.type==='bomb'){
    sfxBomb(); shake(20,26);
    burst(it.x,it.y,'#ff4400','#ff2200',30);
    burst(it.x,it.y,'#ff9900','#ffee00',16);
    addTxt(it.x,it.y,'💥 BOMB!','#ff4444',30);
    lives=Math.max(0,lives-1); combo=0; comboTimer=0;
    if(!lives) endGame();
  } else {
    sfxSlice(); combo++; comboTimer=90;
    const pts=Math.max(1,Math.floor(combo>=6?4:combo>=4?2.5:combo>=2?1.5:1));
    score+=pts; coins+=pts;
    burst(it.x,it.y,it.fr.s,'#ffffff',16);
    spawnHalves(it);
    if(combo>=6){ sfxCombo(4); addTxt(it.x,it.y-45,`🔥 ${combo}x FRENZY`,'#ffd700',30); shake(5,10); }
    else if(combo>=4){ sfxCombo(3); addTxt(it.x,it.y-32,`⚡ ${combo}x COMBO`,'#f0a500',26); }
    else if(combo>=2){ addTxt(it.x,it.y-20,`${combo}x`,'#f0a500',21); }
    else { addTxt(it.x,it.y,`+${pts}`,'#ffd166',19); }
  }
}

/* Fruit halves fly apart along slice-perpendicular direction */
function spawnHalves(it){
  const len=Math.sqrt(sliceVX*sliceVX+sliceVY*sliceVY)||1;
  const nx=-sliceVY/len, ny=sliceVX/len;
  const spd=rnd(5,9);  /* faster = more satisfying split */
  for(let i=0;i<2;i++){
    const d=i?-1:1;
    halves.push({
      e:it.fr.e, x:it.x, y:it.y,
      vx:nx*spd*d+rnd(-1.5,1.5), vy:ny*spd*d-rnd(3,7),
      rot:it.rot, rotV:d*rnd(.08,.17),
      a:1, sz:it.r, h:i
    });
  }
}

/* Juice/fire burst — HIGH velocity = instant punch feel */
function burst(x,y,c1,c2,n){
  for(let i=0;i<n;i++){
    const ang=rnd(0,Math.PI*2), spd=rnd(4,13); /* ← key: was 2–7, now 4–13 */
    particles.push({
      x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-rnd(2,5),
      sz:rnd(3,8), c:Math.random()<.55?c1:c2, a:1
    });
  }
}

const addTxt = (x,y,t,c,sz) => texts.push({x,y,t,c,sz,a:1});
const shake  = (a,d) => { shakeAmt=a; shakeDur=d; };

/* Bomb fire micro-particles */
function updateFire(it){
  if(Math.random()<.58){
    const ang=rnd(0,Math.PI*2), sp=it.r*rnd(.3,.7);
    it.fire.push({
      x:it.x+Math.cos(ang)*sp, y:it.y+Math.sin(ang)*sp,
      vx:rnd(-1.2,1.2), vy:rnd(-3,-1),
      sz:rnd(5,13), a:rnd(.7,1), h:rnd(10,42)
    });
  }
  for(let i=it.fire.length-1;i>=0;i--){
    const f=it.fire[i];
    f.x+=f.vx; f.y+=f.vy; f.a-=.045; f.sz*=.952;
    if(f.a<=.04) it.fire.splice(i,1);
  }
}

/* ── UPDATE (delta-time based) ──────────────────────────────── */
const G=.27; /* gravity per frame at 60 fps */

function update(dt){
  gameTime++; spawnTimer++;
  spawnEvery=Math.max(28, 75-Math.floor(gameTime/180)*4);

  if(spawnTimer>=spawnEvery){
    spawnTimer=0; spawnItem();
    if(gameTime>400&&Math.random()<.36) spawnItem();
    if(gameTime>900&&Math.random()<.22) spawnItem();
  }

  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    if(it.done){ items.splice(i,1); continue; }
    it.vy+=G*dt; it.x+=it.vx*dt; it.y+=it.vy*dt; it.rot+=it.rotV*dt;
    if(it.type==='bomb') updateFire(it);
    if(it.y>H+90){
      if(it.type==='fruit'){
        lives=Math.max(0,lives-1); sfxMiss();
        addTxt(it.x,H-55,'MISSED ✗','#ff5555',19);
        combo=0; comboTimer=0;
        if(!lives) endGame();
      }
      items.splice(i,1);
    }
  }

  for(let i=halves.length-1;i>=0;i--){
    const h=halves[i];
    h.vy+=G*dt; h.x+=h.vx*dt; h.y+=h.vy*dt; h.rot+=h.rotV*dt;
    h.a-=.022;
    if(h.a<=0||h.y>H+100) halves.splice(i,1);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=.22*dt; p.a-=.024;
    if(p.a<=0) particles.splice(i,1);
  }

  for(let i=texts.length-1;i>=0;i--){
    const t=texts[i];
    t.y-=1.9; t.a-=.018;
    if(t.a<=0) texts.splice(i,1);
  }

  trail=trail.slice(-26);
  if(comboTimer>0) comboTimer--; else if(combo>0) combo=0;
  if(shakeDur>0) shakeDur--; else shakeAmt=0;
}

/* ── DRAW ───────────────────────────────────────────────────── */
function drawBG(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0c0a05'); bg.addColorStop(1,'#080604');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const gw=ctx.createRadialGradient(W/2,H,0,W/2,H,H*.62);
  gw.addColorStop(0,'rgba(155,58,0,.09)'); gw.addColorStop(1,'transparent');
  ctx.fillStyle=gw; ctx.fillRect(0,0,W,H);
}

function drawFireBehindBombs(){
  items.forEach(it=>{
    if(it.type!=='bomb'||it.done) return;
    it.fire.forEach(f=>{
      ctx.globalAlpha=f.a*.9;
      ctx.fillStyle=`hsl(${f.h},100%,55%)`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.sz,0,Math.PI*2); ctx.fill();
    });
  });
  ctx.globalAlpha=1;
}

function drawFruit(it){
  ctx.shadowBlur=18; ctx.shadowColor='rgba(0,0,0,.6)';
  ctx.font=`${it.r*1.6}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(it.fr.e,0,0);
  ctx.shadowBlur=0;
}

function drawBomb(it){
  const r=it.r, T=Date.now()/1000, pl=(Math.sin(T*7+it.gph)+1)/2;
  /* fire aura */
  const au=ctx.createRadialGradient(0,0,r*.55,0,0,r*2);
  au.addColorStop(0,`rgba(255,58,0,${.28+pl*.22})`);
  au.addColorStop(.5,`rgba(180,28,0,${.12+pl*.12})`);
  au.addColorStop(1,'transparent');
  ctx.fillStyle=au; ctx.beginPath(); ctx.arc(0,0,r*2,0,Math.PI*2); ctx.fill();
  /* dark crimson body */
  const bd=ctx.createRadialGradient(-r*.3,-r*.3,0,0,0,r);
  bd.addColorStop(0,'#3d0000'); bd.addColorStop(.55,'#1a0000'); bd.addColorStop(1,'#080000');
  ctx.fillStyle=bd; ctx.shadowBlur=16;
  ctx.shadowColor=`rgba(255,28,0,${.3+pl*.35})`;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  /* glowing crack veins */
  ctx.strokeStyle=`rgba(255,55,0,${.35+pl*.4})`; ctx.lineWidth=1.5;
  [0,60,120,180,240,300].forEach(deg=>{
    const a=deg*Math.PI/180;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*r*.75,Math.sin(a)*r*.75); ctx.stroke();
  });
  /* skull stays upright while body spins */
  ctx.rotate(-it.rot);
  ctx.font=`${r*1.08}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('☠️',0,2);
  ctx.rotate(it.rot);
  /* wobbly fuse */
  const fy=-r-14-Math.sin(T*10)*4;
  ctx.strokeStyle='#7b4f29'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(r*.2,-r*.85);
  ctx.quadraticCurveTo(r*.6+Math.cos(T*8)*4,-r-8,r*.35,fy); ctx.stroke();
  /* flickering spark */
  const sr=3.5+Math.sin(T*22)*1.5;
  ctx.shadowBlur=10; ctx.shadowColor='#ff8800';
  ctx.fillStyle=`rgba(255,${150+Math.floor(pl*100)},0,${.7+Math.sin(T*26)*.28})`;
  ctx.beginPath(); ctx.arc(r*.35,fy,sr,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
}

function drawItems(){
  items.forEach(it=>{
    if(it.done) return;
    ctx.save(); ctx.translate(it.x,it.y); ctx.rotate(it.rot);
    it.type==='fruit'?drawFruit(it):drawBomb(it);
    ctx.restore();
  });
}

function drawHalves(){
  halves.forEach(h=>{
    ctx.save(); ctx.globalAlpha=h.a;
    ctx.translate(h.x,h.y); ctx.rotate(h.rot);
    ctx.beginPath();
    h.h===0 ? ctx.rect(-h.sz*2,-h.sz*2,h.sz*2,h.sz*4)
            : ctx.rect(0,-h.sz*2,h.sz*2,h.sz*4);
    ctx.clip();
    ctx.font=`${h.sz*1.6}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(h.e,0,0);
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawTrail(){
  if(trail.length<2) return;
  for(let i=1;i<trail.length;i++){
    const t=i/trail.length;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x,trail[i-1].y);
    ctx.lineTo(trail[i].x,trail[i].y);
    ctx.strokeStyle=`rgba(255,215,60,${t*.9})`;
    ctx.lineWidth=t*5.5; ctx.lineCap='round'; ctx.stroke();
  }
}

function drawTexts(){
  texts.forEach(t=>{
    ctx.globalAlpha=t.a; ctx.fillStyle=t.c;
    ctx.shadowBlur=12; ctx.shadowColor=t.c;
    ctx.font=`bold ${t.sz}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t.t,t.x,t.y); ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,.45)'; rrect(10,10,122,52,8); ctx.fill();
  ctx.strokeStyle='rgba(240,165,0,.25)'; ctx.lineWidth=.5; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.42)'; ctx.font='10px system-ui';
  ctx.textAlign='left'; ctx.fillText('SCORE',20,28);
  ctx.fillStyle='#f0a500'; ctx.font='bold 21px system-ui'; ctx.fillText(score,20,49);
  let ls=''; for(let i=0;i<3;i++) ls+=i<lives?'❤️':'🖤';
  ctx.font='22px sans-serif'; ctx.textAlign='right'; ctx.fillText(ls,W-12,44);
  if(combo>=2&&comboTimer>0){
    ctx.globalAlpha=Math.min(1,comboTimer/30);
    const sz=Math.min(17+combo*2,34), col=combo>=6?'#ffd700':'#f0a500';
    ctx.font=`bold ${sz}px system-ui`; ctx.fillStyle=col;
    ctx.shadowBlur=16; ctx.shadowColor=col; ctx.textAlign='center';
    ctx.fillText(`${combo}× COMBO`,W/2,38); ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  if(gameTime>60){
    const d=gameTime<400?'ACOLYTE':gameTime<800?'DEVOTEE':gameTime<1400?'ORACLE':'LEGEND ✦';
    ctx.globalAlpha=.26; ctx.font='9px system-ui'; ctx.textAlign='center';
    ctx.fillStyle='#f0a500'; ctx.fillText(d,W/2,H-10); ctx.globalAlpha=1;
  }
}

/* ── MAIN LOOP ──────────────────────────────────────────────── */
function loop(ts){
  if(!playing) return;
  /* Delta-time: clamp to max 2 frames to prevent physics spiral
     on tab-switch or heavy jank moments                          */
  const dt = lastTS ? Math.min((ts-lastTS)/16.667, 2) : 1;
  lastTS = ts;

  ctx.save();
  /* Screen shake via random translate */
  if(shakeDur>0){ const s=shakeAmt*(shakeDur/26); ctx.translate(rnd(-s,s),rnd(-s,s)); }
  drawBG();
  drawFireBehindBombs(); /* fire behind bombs */
  drawHalves();
  drawItems();
  drawTrail();
  drawParticles();
  drawTexts();
  drawHUD();
  update(dt);
  ctx.restore();
  requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════════════════════════
   INPUT — PointerEvent API
   ────────────────────────────────────────────────────────────────
   Why PointerEvent instead of touch/mouse:
   · Single code path → browser optimises one handler, not two
   · Fires before touch/mouse events in the browser pipeline
   · setPointerCapture keeps the pointer locked to the canvas
     even when the finger slides off-screen
   · Works for mouse, stylus, and touch with zero changes
   ════════════════════════════════════════════════════════════════ */
cv.addEventListener('pointerdown', e=>{
  e.preventDefault();
  if(activePID!==null) return; /* ignore second finger */
  activePID=e.pointerId;
  cv.setPointerCapture(e.pointerId); /* lock pointer to canvas */
  dragging=true; trail=[{x:e.clientX,y:e.clientY}];
  sliceVX=0; sliceVY=0;
},{passive:false});

cv.addEventListener('pointermove', e=>{
  e.preventDefault();
  if(!dragging||!playing||e.pointerId!==activePID) return;

  const x=e.clientX, y=e.clientY;
  const last=trail[trail.length-1]||{x,y};
  sliceVX=x-last.x; sliceVY=y-last.y;
  const speed=Math.sqrt(sliceVX*sliceVX+sliceVY*sliceVY);

  /* ── TRAIL INTERPOLATION ───────────────────────────────────
     On fast swipes the OS fires events less frequently, leaving
     large gaps between reported positions. We fill those gaps
     with intermediate points so no hitbox can be "jumped over".
     steps = how many sub-points to insert (1 on slow drag).     */
  const steps=Math.max(1,Math.ceil(speed/10));
  for(let s=1;s<=steps;s++){
    trail.push({
      x: last.x+sliceVX*(s/steps),
      y: last.y+sliceVY*(s/steps)
    });
  }
  if(trail.length>40) trail=trail.slice(-40); /* cap trail length */

  /* ── COLLISION CHECK ───────────────────────────────────────
     Minimum speed >3 px: prevents a static finger from
     accidentally triggering a slice.
     Speed-scaled hitbox: expand radius up to +20 px on
     fast swipes — near-misses at high speed now register.      */
  if(speed>3){
    const p1=trail[trail.length-2], p2=trail[trail.length-1];
    if(p1) items.forEach(it=>{
      if(it.done) return;
      const hr=it.r+Math.min(speed*.35,20); /* expanded hitbox */
      if(lhc(p1.x,p1.y,p2.x,p2.y,it.x,it.y,hr)) handleSlice(it);
    });
  }
},{passive:false});

cv.addEventListener('pointerup',e=>{
  e.preventDefault();
  if(e.pointerId!==activePID) return;
  activePID=null; dragging=false; trail=[];
},{passive:false});

cv.addEventListener('pointercancel',e=>{
  if(e.pointerId!==activePID) return;
  activePID=null; dragging=false; trail=[];
});

/* ── GAME CONTROL ───────────────────────────────────────────── */
function startGame(){
  document.getElementById('SS').classList.add('off');
  /* Pre-warm AudioContext NOW so the first slice sound
     plays with zero latency during gameplay.              */
  initAudio();
  score=0; lives=3; combo=0; comboTimer=0; coins=0;
  gameTime=0; spawnTimer=0; spawnEvery=75; lastTS=0;
  items=[]; halves=[]; particles=[]; texts=[]; trail=[];
  shakeAmt=0; shakeDur=0; dragging=false; activePID=null;
  playing=true;
  requestAnimationFrame(loop);
}

function endGame(){
  playing=false;
  document.getElementById('fSc').textContent=score;
  document.getElementById('fCn').textContent=`🪙 ${coins} coins earned`;
  document.getElementById('GS').classList.remove('off');
  /* ── SAVE COINS TO YOUR BACKEND ────────────────────────────
     Uncomment the block below and replace the URL with your
     actual server endpoint or Telegram sendData call.

     fetch('/api/save-coins',{
       method:'POST',
       headers:{'Content-Type':'application/json'},
       body:JSON.stringify({coins,score})
     });

     Or via Telegram Mini App:
     if(TG) TG.sendData(JSON.stringify({game:'prasad',coins,score}));
  ────────────────────────────────────────────────────────────── */
  if(TG) console.log('Coins:',coins,'Score:',score);
}

function restartGame(){
  document.getElementById('GS').classList.add('off');
  startGame();
}

/* Initial idle draw */
drawBG();
